<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Prof. Wilsinho Tavares</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #131B24;
            --primary-light: #2C3E50;
            --accent: #E25E42;
            --success: #2E7D32;
            --bg-page: #FFFFFF;
            --bg-card: #FFFFFF;
            --text-main: #212121;
            --text-muted: #2b2b2b;
            --border-color: #EAEAEA;
            /* Clean light gray border */
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.03);
            /* Very subtle shadow */
            --radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans Pro', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            line-height: 1.5;
            padding: 20px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header Styles */
        .print-header {
            width: 100%;
            margin-bottom: 10px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid #E25E42;
            margin-bottom: 25px;
        }

        .header-logo {
            max-width: 25px;
            /* Star icon size */
            height: auto;
        }

        .prof-name {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .header-main {
            text-align: center;
        }

        h1 {
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 2.4rem;
            color: var(--primary);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* Question Container */
        .questao {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 5px;
            /* More compact padding */
            margin-bottom: 100px;
            /* Reduced margin */
            box-shadow: var(--shadow);
        }

        /* Layout Table for Print */
        .layout-table {
            width: 100%;
            border-collapse: collapse;
        }

        .layout-table td {
            vertical-align: top;
            padding: 0;
        }

        .question-header {

            display: flex;
            align-items: baseline;
            gap: 5px;
            margin-bottom: 5px;
        }

        .question-number {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 1rem;
        }

        .question-title {
            font-family: 'Source Sans Pro', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            color: var(--primary);
        }

        .question-text {
            font-family: 'Source Sans Pro', sans-serif;
            padding: 1px 10px;
            font-size: 1rem;
            margin-bottom: 1px;
            color: #1a1a1a;
        }

        /* Options */
        .options-list {
            list-style: none;
            margin-bottom: 25px;
            /* Tighter than 40px */
        }


        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 1px;
            padding: 1px 15px;
            border: none;
            background: transparent;
        }

        .option-label {
            font-weight: 700;
            color: var(--primary);
            min-width: 25px;
        }

        .option-content {
            font-size: 1rem;
        }

        /* Gabarito Block */
        .gabarito-block {
            background-color: #F8F9FA;
            /* Neutral light background */
            border-left: 2px solid var(--success);
            padding: 2px 5px 1px 10px;
            margin-top: 150px;
        }

        .gabarito-header {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--success);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .gabarito-value {
            color: var(--success);
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .dispositivo-title {
            font-weight: 600;
            font-size: 0.7rem;
            padding: 15px 5px 1px 10px;
            color: var(--primary);
            margin-bottom: 1px;
            display: block;
        }

        .dispositivo-text {
            font-family: 'Lora', serif;
            font-style: italic;
            background: #F8F9Fb;
            padding: 5px 5px 15px 10px;
            border-radius: 4px;
            font-size: 0.9rem;
            border: 1px solid #EEE;
            text-indent: 1px;
            /* Gap at the start of the text */
        }

        .comentario-text {
            font-family: 'Lora', serif;
            color: var(--primary);
            font-size: 0.95rem;
            text-indent: 10px;
            /* Gap at the start of the commentary */
        }

        /* Footer */
        footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 100px;
            padding-bottom: 40px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .questao {
                padding: 5px;
            }

            .question-text {
                font-size: 1rem;
            }
        }

        /* Print Optimization */
        @media print {
            body {
                padding: 0;
                background-color: white;
            }

            @page {
                margin: 1.5cm;
            }

            .print-header {
                display: table-header-group;
                /* This is the secret for repeating table headers */
                width: 100%;
            }



            .container {
                display: table;
                max-width: 100%;
                margin: 0;
                padding-top: 0;
            }

            .header-main {
                text-align: center;
                margin-top: 10px;
            }

            .questao {
                padding: 4px;
                margin-bottom: 5px;
                border: 1px solid #EEE;
                box-shadow: none;
                page-break-inside: avoid;
            }

            .question-header {
                margin-bottom: 2px;
                gap: 5px;
            }

            .question-number {
                background-color: var(--primary) !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                padding: 2px 8px;
                border-radius: 4px;
                font-weight: 600;
                font-size: 0.85rem;
                display: inline-block;
            }

            .question-text,
            .option-content,
            .options-list,
            .option-item,
            .comentario-text,
            .header-top,
            .dispositivo-text {
                font-size: 0.9rem;
            }


            .gabarito-block {
                margin-top: 5px;
                /* mínimo */
            }


            .gabarito-header {
                font-size: 0.75rem;
                margin-bottom: 2px;
            }

            .gabarito-value {
                font-size: 0.85rem;
                margin-bottom: 2px;
            }

            .dispositivo-title {
                font-size: 0.8rem;
                margin-bottom: 2px;
            }

            .fa-check-circle {
                display: none !important;
            }



            footer {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Using table structure for reliable repeating header in print -->
        <table class="layout-table">
            <thead>
                <tr>
                    <td>
                        <div class="print-header">
                            <div class="header-top">
                                <img src="Logooficial.png" alt="Logo" class="header-logo">
                                <span class="prof-name">Prof. Wilsinho Tavares</span>
                            </div>
                        </div>
                    </td>
                </tr>
            </thead>
            <tbody id="questoes-container">
                <!-- Questions will be dynamically loaded here as <tr> rows -->
            </tbody>
        </table>

        <footer>
            &copy; Professor Wilsinho Tavares
        </footer>
    </div>

    <!-- Data & Renderer -->
    <script>
        const questoesData = [
            // Novas questões serão adicionadas aqui
        ];

        function renderQuestoes() {
            const container = document.getElementById('questoes-container');

            // Header main logic (only on first row)
            const headerMain = `
                <tr>
                    <td>
                        <header class="header-main">
                            <h1>Sefaz GO — ITCMD</h1>
                            <p class="subtitle">Lei nº 11.651/91 | Padrão FCC com Comentários</p>
                        </header>
                    </td>
                </tr>
            `;

            container.innerHTML = headerMain + questoesData.map((q, index) => `
                <tr>
                    <td>
                        <article class="questao">
                            <div class="question-header">
                        <span class="question-number">Questão ${index + 1}</span>
                        <h2 class="question-title">${q.titulo}</h2>
                    </div>
                    <div class="question-text">
                        ${q.pergunta.replace(/\n/g, '<br>')}
                    </div>
                    
                    <ul class="options-list">
                        ${q.opcoes.map((opt, i) => `
                            <li class="option-item">
                                <span class="option-label">${String.fromCharCode(97 + i)})</span>
                                <span class="option-content">${opt}</span>
                            </li>
                        `).join('')}
                    </ul>

                    <div class="gabarito-block">
                        <div class="gabarito-value">
                            Resposta correta: <strong>${q.gabarito}</strong>
                        </div>
                        
                        <div class="comentario-text">
                            ${q.comentario.replace(/\n/g, '<br>')}
                        </div>

                        <span class="dispositivo-title">Dispositivo Legal:</span>
                        <div class="dispositivo-text">
                            ${q.dispositivo.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                </article>
            </td>
        </tr>
    `).join('');
        }

        // Initialize display
        document.addEventListener('DOMContentLoaded', renderQuestoes);
    </script>

    <!-- Boxicons / FontAwesome for icons if needed -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>

</html>
