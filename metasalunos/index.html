<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metas Diárias - Antigravity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- SDK do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        
        <!-- TELA 2: CONFIGURAÇÃO INICIAL -->
        <div id="tela-config" class="aba-tela">
            <div style="text-align: center; margin-bottom: 30px; margin-top: 50px;">
                <h1 style="font-family: var(--font-title); color: var(--color-vermelho);">Bem-vindo!</h1>
                <p style="color: var(--color-cinza-verdeado);">Precisamos ajustar seu ciclo antes de começar.</p>
            </div>
            <label>Qual o seu Nome Completo?</label>
            <input type="text" id="configNome" class="input" placeholder="Ex: João da Silva">
            
            <label>Quantas Metas Diárias fará?</label>
            <select id="configMetasPorDia" class="input">
                <option value="4">4 Metas por dia</option>
                <option value="5">5 Metas por dia</option>
            </select>
            
            <button class="botao" onclick="salvarConfiguracao()" style="width: 100%; margin-top: 20px;">Começar Cronograma</button>
        </div>

        <!-- TELA 3: DASHBOARD PRINCIPAL -->
        <div id="tela-dashboard" class="aba-tela" style="padding: 0;">
            <!-- Cabeçalho de Resumo / Estatísticas -->
            <header class="header-principal">
                <h1 id="tituloSemana">Suas Metas Diárias</h1>
                <div class="estatisticas-badge">
                    <span id="estaTotal">Aproveitamento: Carregando...</span>
                    <span class="badge-classificacao" id="estaClassifica">-</span>
                </div>
                <button onclick="fazerLogout()" style="background: none; border: none; color: white; text-decoration: underline; margin-top: 12px; cursor: pointer;">Sair</button>
            </header>

            <div style="padding: 24px;">
                <div id="listaMetas">
                    <div style="text-align: center; color: var(--color-cinza-verdeado); padding: 40px;">
                        Carregando o dia de hoje...
                    </div>
                </div>
            </div>
        </div>
        
    </div>

    <!-- Modal de Preenchimento -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 style="margin-top: 0; color: var(--color-preto-azulado); margin-bottom: 12px; font-family: 'Outfit', sans-serif;">Reportar Meta</h3>
            <p id="modalNomeMeta" style="color:var(--color-cinza-verdeado); font-size:14px; margin-bottom: 24px; font-weight:600;"></p>
            
            <label>Quantidade de questões <span style="color: var(--color-vermelho);">*</span></label>
            <input type="number" class="input" id="qtdQuestoes" placeholder="Ex: 50" min="1" required>
            
            <label>Quantidade de acertos <span style="color: var(--color-vermelho);">*</span></label>
            <input type="number" class="input" id="qtdAcertos" placeholder="Ex: 40" min="0" required>
            
            <label>Link caderno de erradas <span>(opcional)</span></label>
            <input type="url" class="input" id="linkErros" placeholder="https://...">

            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button class="botao secundario" style="flex: 1;" onclick="fecharModal()">Cancelar</button>
                <button class="botao" style="flex: 2;" id="btnSalvarResposta" onclick="salvarResposta()">Concluir</button>
            </div>
        </div>
    </div>

    <!-- Scripts de Integração Real -->
    <script src="js/app.js"></script>
</body>
</html>
