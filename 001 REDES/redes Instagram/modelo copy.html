<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Carrossel — prof.wilsinhotavares</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- html2canvas para exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --twitter-blue: #1D9BF0;
            --twitter-gray: #536471;
            --twitter-black: #0F1419;
            --twitter-border: #EFF3F4;
            --sefaz-orange: #FF7A00;

            /* Category Colors */
            --color-fisco: #0F4C81;
            /* Classic Blue - More professional */
            --color-controle: #E0115F;
            /* Ruby - More premium pink */
            --color-noticias: #00815B;
            /* Emerald - More premium green */

            --card-bg: #FFFFFF;
            --page-bg: #F0F2F5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--page-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            padding: 100px 20px;
        }

        /* The Card Container: 1080x1350 */
        .instagram-card {
            width: 1080px;
            height: 1350px;
            background: linear-gradient(145deg, #ffffff, #f9fafb);
            border-radius: 40px;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.08);
            position: relative;
            padding: 100px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--twitter-border);
            overflow: hidden;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .instagram-card:hover {
            transform: translateY(-10px);
        }

        /* Header Section */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--twitter-border);
            background-image: url('WILSON v1.png');
            background-size: cover;
            background-position: center top;
            flex-shrink: 0;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .name-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .display-name {
            font-size: 42px;
            font-weight: 700;
            color: var(--twitter-black);
            letter-spacing: -1px;
        }

        .verified-icon {
            width: 40px;
            height: 40px;
            color: var(--twitter-blue);
        }

        .username {
            font-size: 32px;
            color: var(--twitter-gray);
            font-weight: 400;
        }

        /* Tags and Alerts Section */
        .highlights {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
        }

        .tag-pill {
            color: white;
            padding: 12px 32px;
            border-radius: 9999px;
            font-size: 38px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tag-principal {
            display: inline-block;
            background: linear-gradient(90deg, #1c4fa3, #2f7df6);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 42px;
            padding: 20px 32px;
            border-radius: 20px;
            box-shadow:
                0 8px 25px rgba(0, 0, 0, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        /* Logic for Colors */
        .tag-pill.fisco {
            background-color: var(--color-fisco);
        }

        .tag-pill.controle {
            background-color: var(--color-controle);
        }

        .tag-pill.noticias {
            background-color: var(--color-noticias);
        }

        .tag-principal.fisco {
            background-color: var(--color-fisco);
        }

        .tag-principal.controle {
            background-color: var(--color-controle);
        }

        .tag-principal.noticias {
            background-color: var(--color-noticias);
        }

        .alert-pill {
            background-color: var(--sefaz-orange);
            color: white;
            padding: 12px 32px;
            border-radius: 9999px;
            font-size: 38px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tag-principal {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(90deg, #1c4fa3, #2f7df6);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 52px;
            padding: 35px 40px;
            border-radius: 35px;
            box-shadow: 0 15px 45px rgba(28, 79, 163, 0.25);
            text-align: center;
            margin-bottom: 60px;
            width: 100%;
            letter-spacing: -1px;
        }

        /* Override base gradient if category specific colors are needed for principal tag */
        .tag-principal.fisco {
            background: linear-gradient(90deg, #1c4fa3, #2f7df6);
        }

        .tag-principal.controle {
            background: linear-gradient(90deg, #E0115F, rgb(172, 2, 28));
        }

        /* Keeping blue as per image for CGE */
        .tag-principal.noticias {
            background: linear-gradient(90deg, #03744e, #05704c);
        }

        /* Content Section */
        .content {
            flex-grow: 1;
        }


        /* Tamanho da Fonte */
        .body-text {
            font-size: 45px;
            line-height: 1.6;
            color: var(--twitter-black);
            font-weight: 500;
            text-align: justify;
        }

        .body-text h2 {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 30px;
            color: var(--twitter-black);
            letter-spacing: -1.5px;
        }

        .body-text h3 {
            font-size: 48px;
            font-weight: 700;
            margin-top: 40px;
            margin-bottom: 20px;
            color: var(--twitter-black);
        }

        .body-text img {
            width: 100%;
            border-radius: 30px;
            border: 4px solid var(--twitter-border);
            margin-top: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.05);
        }

        .body-text p {
            margin-bottom: 0px;
            margin-top: 15px;

        }

        .body-text strong {
            font-weight: 700;
        }

        /* Espaçamento personalizado para parágrafos e listas */
        p:first-of-type {
            margin-bottom: 4px;
            text-indent: 4px;
        }

        ul {
            margin-top: 2px;
        }

        ul li {
            margin-left: 40px;
        }

        /* Tabela Personalizada */
        .body-text table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            font-size: 30px;
            /* Reduzindo um pouco para caber no card */
        }

        .body-text th {
            background-color: var(--twitter-border);
            text-align: center;
            padding: 15px;
            border: 2px solid #ddd;
        }

        .body-text td {
            padding: 15px;
            border: 2px solid #ddd;
            vertical-align: top;
            text-align: center;
        }

        /* Large Numbers highlight */
        .highlight-number {
            font-weight: 800;
            color: var(--twitter-black);
            border-bottom: 8px solid rgba(29, 155, 240, 0.1);
        }

        /* Twitter-style interaction bar at bottom */
        .footer-decoration {
            margin-top: auto;
            border-top: 1px solid var(--twitter-border);
            padding-top: 40px;
            display: flex;
            justify-content: flex-end;
            /* Align right as date is removed */
            color: var(--twitter-gray);
            font-size: 25px;
            opacity: 0.5;
        }

        /* Page Instructions (hidden on print/screenshot) */
        .instructions {
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 2px dashed #ccc;
            text-align: center;
            max-width: 800px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .download-btn {
            margin: 20px auto 0;
            background: #1D9BF0;
            color: white;
            border: none;
            padding: 16px 32px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(29, 155, 240, 0.3);
        }

        .download-btn:hover {
            background: #1a8cd8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(29, 155, 240, 0.4);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .download-btn svg {
            width: 24px;
            height: 24px;
        }

        .download-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        @media print {
            .instructions {
                display: none;
            }

            body {
                gap: 0;
                padding: 0;
                background: white;
            }

            .instagram-card {
                box-shadow: none;
                border: none;
                page-break-after: always;
            }
        }
    </style>
</head>

<body>

    <div class="instructions">
        <h2>🚀 Gerador Rápido de Carrossel</h2>
        <p>Para criar novos slides, adicione objetos ao array <code>slidesData</code> no final do código HTML.</p>
        <p>Use as categorias: <strong>fisco</strong> (azul), <strong>controle</strong> (rosa) ou
            <strong>noticias</strong> (verde).
        </p>

        <button id="btn-export-all" class="download-btn">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
            </svg>
            Baixar Todos os Slides (PNG)
        </button>
    </div>

    <!-- AQUI The container for generated cards -->
    <div id="carousel-container"></div>
    <script>
        const slidesData = [
            {
                category: "fisco",
                principal: "Concurso ISS Manaus 2026",
                content: `
                <h2>FCC é a escolhida para o concurso!</h2>
                    <p>A Fundação Carlos Chagas (FCC) foi oficializada como a banca organizadora do concurso <strong>ISS Manaus 2026</strong>.</p>
                    <p>O Concurso ISS Manaus vai contemplar 10 vagas imediatas, mais 60 em cadastro reserva, para o cargo de Auditor Fiscal de Tributos Municipais. `
            },
            {
                category: "fisco",
                principal: "Remuneração ISS Manaus 2026",
                tag: "Nova lei amplia vagas",
                alert: "Novo cargo criado",
                content: `
                    <p>Auditor com vencimento base de R$ 5.063,05 + Gratificação de Produtividade Fazendária no valor de R$ 19.754,00.<br> Remuneração inicial de <strong>R$ 24.817,05</strong>:
                    <ul>
                        <li><strong>10 vagas</strong></li>
                        <li><strong>60 vagas em cadastro reserva</strong></li>
                    </ul>  `
            },
            ,
            {
                category: "fisco",
                principal: "Estrutura do certame Manaus",
                alert: "Diversidade de funções",
                content: `
                                     <p>O concurso será composto por <b>três fases distintas</b>, com critérios eliminatórios e classificatórios conforme cada etapa: 
                                     <ul>
                                         <li><b>Prova Objetiva</b>, caráter eliminatório e classificatório</li> 
                                         <li><b>Prova Discursiva</b>, caráter eliminatório e classificatório</li> 
                                         <li><b>Pesquisa de Vida Pregressa</b>, caráter exclusivamente eliminatório</li> 
                                     </ul>
                      
                `
            },
            {
                category: "fisco",
                principal: "Estrutura do certame Manaus",
                alert: "Déficit de servidores",
                content: `<ul> <li><b>160 questões objetivas</b> no total</li> <li><b>Prova discursiva com 4 questões</b></li> <li><b>Duração </b>, 4 horas por etapa</li> </ul>
                <table border="1" cellpadding="6"> <tr> <th>Etapa</th> <th>Conteúdo</th> <th>Questões</th> <th>Período</th> </tr> <tr> <td>Prova Objetiva I</td> <td>Conhecimentos Gerais</td> <td><b>90</b></td> <td>Matutino</td> </tr> <tr> <td>Prova Objetiva II</td> <td>Conhecimentos Específicos</td> <td><b>70</b></td> <td>Vespertino</td> </tr> <tr> <td>Prova Discursiva</td> <td>Conhecimentos Específicos</td> <td><b>4 questões</b></td> <td>Matutino</td> </tr> </table>
                `
            },


        ];

        function renderSlides() {
            const container = document.getElementById('carousel-container');
            container.style.display = 'flex';
            container.style.flexDirection = 'column';
            container.style.gap = '50px';

            container.innerHTML = slidesData.map(slide => `
                <div class="instagram-card">
                    <div class="header">
                        <div class="avatar" role="img" aria-label="Prof. Wilsinho Tavares"></div>
                        <div class="user-info">
                            <div class="name-wrapper">
                                <span class="display-name">Prof Wilsinho Tavares</span>
                                <svg viewBox="0 0 24 24" class="verified-icon" fill="currentColor">
                                    <g><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.67-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.67-.88 3.34-2.19c1.39.46 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2l-3.53-3.53 1.41-1.41 2.12 2.12 4.95-4.95 1.41 1.41-6.36 6.36z"></path></g>
                                </svg>
                            </div>
                            <span class="username">profwilsontavares.concursos
</span>
                        </div>
                    </div>

                    ${slide.principal ? `
                        <div class="tag-principal ${slide.category}">${slide.principal}</div>
                    ` : `
                        <div class="highlights">
                            <div class="tag-pill ${slide.category}">${slide.tag}</div>
                            ${slide.alert ? `<div class="alert-pill">${slide.alert}</div>` : ''}
                        </div>
                    `}

                    <div class="content">
                        <div class="body-text">
                            ${slide.content}
                        </div>
                    </div>

                    <div class="footer-decoration">
                        <span>Estude com o Prof. Wilsinho</span>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', renderSlides);

        // Função de Exportação
        document.getElementById('btn-export-all').addEventListener('click', async function () {
            const btn = this;
            const originalText = btn.innerHTML;
            const cards = document.querySelectorAll('.instagram-card');

            if (cards.length === 0) return;

            try {
                btn.disabled = true;
                btn.style.opacity = "0.7";

                // Fixa scroll para evitar desvios na renderização
                window.scrollTo(0, 0);

                for (let i = 0; i < cards.length; i++) {
                    btn.innerHTML = `Processando slide ${i + 1} de ${cards.length}...`;

                    const canvas = await html2canvas(cards[i], {
                        scale: 1.5,
                        useCORS: true,
                        backgroundColor: "#ffffff",
                        logging: false,
                        onclone: (clonedDoc) => {
                            const clonedCard = clonedDoc.querySelectorAll('.instagram-card')[i];
                            clonedCard.style.transform = 'none';
                            clonedCard.style.boxShadow = 'none';
                        }
                    });

                    const link = document.createElement('a');
                    link.download = `slide-${(i + 1).toString().padStart(2, '0')}.png`;
                    link.href = canvas.toDataURL('image/png', 1.0);
                    link.click();

                    // Pequeno delay para evitar bloqueio do navegador em downloads múltiplos
                    await new Promise(r => setTimeout(r, 600));
                }

                btn.innerHTML = "✅ Todos os Slides Baixados!";
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    btn.style.opacity = "1";
                }, 3000);

            } catch (err) {
                console.error("Erro ao exportar carrossel:", err);
                alert("Ocorreu um erro ao gerar as imagens. Tente usar o método de impressão (Ctrl+P).");
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        });
    </script>
</body>

</html>
