<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Carrossel — prof.wilsinhotavares</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --twitter-blue: #1D9BF0;
            --twitter-gray: #536471;
            --twitter-black: #0F1419;
            --twitter-border: #EFF3F4;
            --sefaz-orange: #FF7A00;

            /* Category Colors */
            --color-fisco: #0F4C81;
            /* Classic Blue - More professional */
            --color-controle: #E0115F;
            /* Ruby - More premium pink */
            --color-noticias: #00815B;
            /* Emerald - More premium green */

            --card-bg: #FFFFFF;
            --page-bg: #F0F2F5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--page-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            padding: 100px 20px;
        }

        /* The Card Container: 1080x1350 */
        .instagram-card {
            width: 1080px;
            height: 1350px;
            background: linear-gradient(145deg, #ffffff, #f9fafb);
            border-radius: 40px;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.08);
            position: relative;
            padding: 100px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--twitter-border);
            overflow: hidden;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .instagram-card:hover {
            transform: translateY(-10px);
        }

        /* Header Section */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--twitter-border);
        }

        .user-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .name-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .display-name {
            font-size: 42px;
            font-weight: 700;
            color: var(--twitter-black);
            letter-spacing: -1px;
        }

        .verified-icon {
            width: 40px;
            height: 40px;
            color: var(--twitter-blue);
        }

        .username {
            font-size: 32px;
            color: var(--twitter-gray);
            font-weight: 400;
        }

        /* Tags and Alerts Section */
        .highlights {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
        }

        .tag-pill {
            color: white;
            padding: 12px 32px;
            border-radius: 9999px;
            font-size: 28px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Logic for Colors */
        .tag-pill.fisco {
            background-color: var(--color-fisco);
        }

        .tag-pill.controle {
            background-color: var(--color-controle);
        }

        .tag-pill.noticias {
            background-color: var(--color-noticias);
        }

        .alert-pill {
            background-color: var(--sefaz-orange);
            color: white;
            padding: 12px 32px;
            border-radius: 9999px;
            font-size: 28px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Content Section */
        .content {
            flex-grow: 1;
        }



        .body-text {
            font-size: 42px;
            line-height: 1.6;
            color: var(--twitter-black);
            font-weight: 500;
            text-align: justify;
        }

        .body-text h2 {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 30px;
            color: var(--twitter-black);
            letter-spacing: -1.5px;
        }

        .body-text h3 {
            font-size: 48px;
            font-weight: 700;
            margin-top: 40px;
            margin-bottom: 20px;
            color: var(--twitter-black);
        }

        .body-text img {
            width: 100%;
            border-radius: 30px;
            border: 4px solid var(--twitter-border);
            margin-top: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.05);
        }

        .body-text p {
            margin-bottom: 0px;
            margin-top: 15px;

        }

        .body-text strong {
            font-weight: 700;
        }

        /* Espaçamento personalizado para parágrafos e listas */
        p:first-of-type {
            margin-bottom: 4px;
            text-indent: 4px;
        }

        ul {
            margin-top: 2px;
        }

        ul li {
            margin-left: 40px;
        }

        /* Tabela Personalizada */
        .body-text table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            font-size: 30px;
            /* Reduzindo um pouco para caber no card */
        }

        .body-text th {
            background-color: var(--twitter-border);
            text-align: left;
            padding: 15px;
            border: 2px solid #ddd;
        }

        .body-text td {
            padding: 15px;
            border: 2px solid #ddd;
            vertical-align: top;
            text-align: left;
        }

        /* Large Numbers highlight */
        .highlight-number {
            font-weight: 800;
            color: var(--twitter-black);
            border-bottom: 8px solid rgba(29, 155, 240, 0.1);
        }

        /* Twitter-style interaction bar at bottom */
        .footer-decoration {
            margin-top: auto;
            border-top: 1px solid var(--twitter-border);
            padding-top: 40px;
            display: flex;
            justify-content: flex-end;
            /* Align right as date is removed */
            color: var(--twitter-gray);
            font-size: 25px;
            opacity: 0.5;
        }

        /* Page Instructions (hidden on print/screenshot) */
        .instructions {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px dashed #ccc;
            text-align: center;
            max-width: 800px;
        }

        @media print {
            .instructions {
                display: none;
            }

            body {
                gap: 0;
                padding: 0;
                background: white;
            }

            .instagram-card {
                box-shadow: none;
                border: none;
                page-break-after: always;
            }
        }
    </style>
</head>

<body>

    <div class="instructions">
        <h2>🚀 Gerador Rápido de Carrossel</h2>
        <p>Para criar novos slides, adicione objetos ao array <code>slidesData</code> no final do código HTML.</p>
        <p>Use as categorias: <strong>fisco</strong> (azul), <strong>controle</strong> (rosa) ou
            <strong>noticias</strong> (verde).
        </p>
    </div>

    <!-- The container for generated cards -->
    <div id="carousel-container"></div>

    <script>
        const slidesData = [
            {
                tag: "SEFAZ-BA",
                category: "noticias",
                alert: "COMISSÃO FORMADA",
                content: `
                  <h2>Concurso Sefaz BA: Comissão Formada para 200 Vagas</h2>
                  <p>Foram instituídas as <strong>comissões responsáveis</strong> pelas atividades do novo concurso público da <strong>Secretaria da Fazenda da Bahia (Sefaz BA)</strong>.</p>
                  <p>A medida representa um avanço relevante na preparação do certame, que prevê <strong>200 vagas</strong> no total.</p>
                `
            },
            {
                tag: "SEFAZ-BA",
                category: "fisco",
                alert: "AUTORIZAÇÃO",
                content: `
                  <p>Confira o detalhamento das comissões formadas para o novo certame:</p>
                  <p><img src="autorizacao-concurso-sefaz-ba.jpg" alt="Comissão formada Sefaz BA"></p>
                `
            },
            {
                tag: "SEFAZ-BA",
                category: "fisco",
                alert: "200 VAGAS",
                content: `
                    <p>Ao todo, estão previstas <strong>200 vagas</strong>, distribuídas entre os seguintes cargos:</p>
                    <ul style="margin-top: 30px;">
                      <li><strong>Auditor Fiscal:</strong> 100 vagas</li>
                      <li><strong>Agente de Tributos:</strong> 100 vagas</li>
                    </ul>
                    <p>O <strong>edital de abertura</strong> deve ser publicado ainda em <strong>2026</strong>, com nomeações previstas para <strong>janeiro de 2027</strong>.</p>
                `
            },
            {
                tag: "Agente de Tributos",
                category: "fisco",
                alert: "R$ 24 MIL",
                content: `
                    <h3>Remuneração: Agente de Tributos</h3>
                    <p>Com a <em>reestruturação salarial</em>, a remuneração total, considerando <strong>gratificações</strong>, <strong>indenizações</strong> e <strong>auxílio alimentação</strong>, pode alcançar cerca de <strong>R$ 24 mil</strong> brutos.</p>
                    <p><img src="remuneraca agente de tributos.jpg" alt="Agente de Tributos"></p>
                `
            },
            {
                tag: "Auditor Fiscal",
                category: "fisco",
                alert: "R$ 33 MIL",
                content: `
                    <h3>Remuneração: Auditor Fiscal</h3>
                    <p>Para Auditor, incluindo <strong>gratificações</strong>, <strong>indenizações</strong> e <strong>auxílio alimentação</strong>, a remuneração total pode chegar a aproximadamente <strong>R$ 33 mil</strong> brutos.</p>
                    <p><img src="remuneraca Auditor de tributos.jpg" alt="Auditor Fiscal"></p>
                `
            }
        ];

        function renderSlides() {
            const container = document.getElementById('carousel-container');
            container.style.display = 'flex';
            container.style.flexDirection = 'column';
            container.style.gap = '50px';

            container.innerHTML = slidesData.map(slide => `
                <div class="instagram-card">
                    <div class="header">
                        <img src="WILSON v1.png" alt="Prof. Wilsinho Tavares" class="avatar">
                        <div class="user-info">
                            <div class="name-wrapper">
                                <span class="display-name">Prof Wilsinho Tavares</span>
                                <svg viewBox="0 0 24 24" class="verified-icon" fill="currentColor">
                                    <g><path d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81c-.67-1.31-1.91-2.19-3.34-2.19s-2.67.88-3.33 2.19c-1.4-.46-2.91-.2-3.92.81s-1.26 2.52-.8 3.91c-1.31.67-2.2 1.91-2.2 3.34s.89 2.67 2.2 3.34c-.46 1.39-.21 2.9.8 3.91s2.52 1.26 3.91.81c.67 1.31 1.91 2.19 3.34 2.19s2.67-.88 3.34-2.19c1.39.46 2.9.2 3.91-.81s1.27-2.52.81-3.91c1.31-.67 2.19-1.91 2.19-3.34zm-11.71 4.2l-3.53-3.53 1.41-1.41 2.12 2.12 4.95-4.95 1.41 1.41-6.36 6.36z"></path></g>
                                </svg>
                            </div>
                            <span class="username">profwilsontavares.concursos
</span>
                        </div>
                    </div>

                    <div class="highlights">
                        <div class="tag-pill ${slide.category}">${slide.tag}</div>
                        ${slide.alert ? `<div class="alert-pill">${slide.alert}</div>` : ''}
                    </div>

                    <div class="content">
                        <div class="body-text">
                            ${slide.content}
                        </div>
                    </div>

                    <div class="footer-decoration">
                        <span>Estude com o Prof. Wilsinho</span>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', renderSlides);
    </script>
</body>

</html>
