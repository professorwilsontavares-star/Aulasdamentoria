<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criador de Tags — Apostila</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@700;800;900&display=swap"
        rel="stylesheet">
    <!-- html2canvas para exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: #f0f2f5;
            /* Light gray background for previewing the tag */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Centralize vertically */
            gap: 40px;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .tag-container {
            position: relative;
            display: inline-block;
            /* Auto-size to content */
            padding: 20px;
            background: transparent;
            /* Mandatory transparency */
            border: 2px dashed #ccc;
            /* Visual guide for transparency */
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tag-container:hover {
            border-color: #1a7ed4;
            transform: scale(1.02);
        }

        .badges-row {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0;
            margin: 0;
        }

        .badge-ferramentas {
            background: #E25E42;
            /* Premium Orange/Red */
            color: #ffffff;
            font-family: "Montserrat", sans-serif;
            font-weight: 800;
            font-size: 60px;
            /* Adjusted for tag size */
            padding: 12px 36px 14px 18px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(226, 94, 66, 0.3);
            white-space: nowrap;
        }

        .badge-icon {
            width: 48px;
            height: 48px;
            background: #ffffff;
            color: #E25E42;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 32px;
            line-height: 1;
        }



        .tec-word {
            display: inline-flex;
            align-items: baseline;
            gap: 0;
        }






        .page-instructions {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 22px 30px;
            max-width: 1080;
            width: 100%;
            color: rgba(255, 255, 255, 0.65);
            font-size: 15px;
            line-height: 1.6;
        }

        .page-instructions h2 {
            color: #fff;
            font-size: 18px;
            margin-bottom: 6px;
        }

        .page-instructions code {
            background: rgba(255, 255, 255, 0.12);
            padding: 2px 7px;
            border-radius: 4px;
            font-family: monospace;
        }

        .download-btn {
            margin-top: 20px;
            background: #1a7ed4;
            color: white;
            border: none;
            padding: 14px 28px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(26, 126, 212, 0.3);
        }

        .download-btn:hover {
            background: #1565c0;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 126, 212, 0.4);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .download-btn svg {
            width: 20px;
            height: 20px;
        }

        .badge-jurisprudencia {
            background: transparent;
            color: #7B2FBE;
            font-family: "Montserrat", sans-serif;
            font-weight: 800;
            font-size: 60px;
            padding: 12px 36px 14px 18px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 4px solid #7B2FBE;
            white-space: nowrap;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                gap: 0;
            }

            .page-instructions {
                display: none;
            }

            .yt-thumbnail {
                box-shadow: none;
                border-radius: 0;
                page-break-after: always;
            }
        }
    </style>
</head>

<body>

    <div class="page-instructions">
        <h2>🏷️ Criador de Tags para Apostila</h2>
        <p>Gere tags profissionais com fundo transparente para seus materiais de estudo.
        </p>
        <button id="btn-export" class="download-btn">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
            </svg>
            Baixar Tag (PNG Transparente)
        </button>
    </div>

    <div class="tag-container">
        <div class="badges-row">
            <div class="badge-jurisprudencia">
                ⚖ Jurisprudência
            </div>
        </div>
    </div>

    <div class="tag-container">
        <div class="badges-row">
            <div class="badge-ferramentas">
                <div class="badge-icon">★</div>
                DICA DE PROVA
            </div>
        </div>
    </div>
    <div class="tag-container">
        <div class="badges-row">
            <div class="badge-ferramentas">
                <div class="badge-icon">★</div>
                DICA DE PROVA
            </div>
        </div>
    </div>

    <div class="tag-container">
        <div class="badges-row">
            <div class="badge-ferramentas">
                <div class="badge-icon">★</div>
                DICA DE PROVA
            </div>
        </div>
    </div>



    <script>
        document.getElementById('btn-export').addEventListener('click', function () {
            const btn = this;
            const originalText = btn.innerHTML;

            // Feedback visual
            btn.innerHTML = "Processando...";
            btn.style.opacity = "0.7";
            btn.style.pointerEvents = "none";

            const target = document.querySelector('.tag-container');

            // Fixa scroll para evitar desvios na renderização
            window.scrollTo(0, 0);

            html2canvas(target, {
                scale: 3, // High quality for tags
                useCORS: true,
                backgroundColor: null, // Transparent background
                logging: false,
                onclone: (clonedDoc) => {
                    const tag = clonedDoc.querySelector('.tag-container');
                    tag.style.transform = 'none';
                    tag.style.border = 'none'; // Remove visual guide in export
                }
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'tag-dica-de-prova.png';
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();

                // Restaurar botão
                btn.innerHTML = originalText;
                btn.style.opacity = "1";
                btn.style.pointerEvents = "auto";
            }).catch(err => {
                console.error("Erro ao exportar:", err);
                alert("Erro ao gerar imagem. Tente usar o método do navegador (F12).");
                btn.innerHTML = originalText;
                btn.style.opacity = "1";
                btn.style.pointerEvents = "auto";
            });
        });
    </script>
</body>

</html>
