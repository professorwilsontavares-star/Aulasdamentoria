<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail YouTube — Auditor Fiscal Sefaz Bahia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: #0f1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
            padding: 60px 20px;
            min-height: 100vh;
        }

        /* ── THUMBNAIL 1920×1080 ── */
        .yt-thumbnail {
            width: 1920px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 60px 180px rgba(0, 0, 0, 0.6);
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .yt-thumbnail:hover {
            transform: translateY(-6px);
            box-shadow: 0 60px 160px rgba(0, 0, 0, 0.7);
        }

        /* Fundo azul — IGUAL ao modelo */
        .bg-layer {
            position: absolute;
            inset: 0;
            background: #1a7ed4;
        }

        /* Padrão de logos repetidas ao fundo */
        .bg-pattern {
            position: absolute;
            inset: 0;
            opacity: 0.16;
            background-image: url("../logotecconcursos.png");
            background-size: 270px auto;
            background-repeat: repeat;
            transform: rotate(-15deg) scale(1);
            transform-origin: center center;
        }

        /* Gradiente sutil */
        .bg-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(10, 70, 150, 0.35) 100%);
        }

        /* ── ÁREA ESQUERDA ── */
        .left-area {
            position: absolute;
            left: 60px;
            top: 0;
            bottom: 0;
            width: 1160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
        }

        /* Badges com leve rotation — igual ao modelo */
        .badges-row {
            transform: rotate(-2deg);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 32px;
            margin-left: 10px;
        }

        /* Badge branco "Análise" */
        .badge-analise {
            background: #ffffff;
            color: #1a7ed4;
            font-family: "Montserrat", sans-serif;
            font-weight: 900;
            font-size: 52px;
            padding: 15px 54px;
            margin-left: 40px;
            border-radius: 75px;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.2);
        }

        /* Badge preto "DO EDITAL" com ícone */
        .badge-edital {
            background: #111111;
            color: #ffffff;
            font-family: "Montserrat", sans-serif;
            font-weight: 800;
            font-size: 42px;
            padding: 18px 48px 18px 30px;
            border-radius: 75px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.3);
        }

        .badge-icon {
            width: 63px;
            height: 63px;
            background: #1a7ed4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .badge-icon svg {
            width: 36px;
            height: 36px;
        }

        /* Logo do Estado (centro-topo) */
        .logo-estado {
            position: absolute;
            top: 54px;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 250px;
            object-fit: contain;
            z-index: 12;
        }

        /* ── Título principal ── */
        .main-title {
            font-family: "Montserrat", sans-serif;
            font-weight: 900;
            line-height: 1.08;
            color: #ffffff;
            letter-spacing: -2px;
            text-shadow: 0 6px 36px rgba(0, 0, 0, 0.25);
        }

        /* Linha 1: AJUSTAR AQUI — branco grande */
        .line-1 {
            font-size: 130px;
            display: block;
            white-space: nowrap;
        }

        /* Linha 2: AJUSTAR AQUI — */
        .line-2-wrap {
            display: block;
            background: #111111;
            padding: 6px 0 0px 0;
            margin-top: 8px;
            text-align: center;
        }

        .line-2 {
            font-size: 110px;
            display: block;
            color: #ffffff;

        }

        /* Pill de remuneração — mesmo estilo da referência */
        .remun-pill {
            margin-top: 40px;
            display: inline-flex;
            align-items: center;
            background: transparent;
            border: 3.5px solid #ffffff;
            border-radius: 80px;
            padding: 14px 44px;
        }

        .remun-pill span {
            font-family: "Montserrat", sans-serif;
            font-weight: 800;
            font-size: 72px;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        /* Tag banca — pequena, abaixo do pill */
        .banca-tag {
            margin-top: 22px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border-radius: 10px;
            padding: 10px 28px;
        }

        .banca-tag .label {
            font-family: "Inter", sans-serif;
            font-weight: 700;
            font-size: 30px;
            color: rgba(255, 255, 255, 0.75);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .banca-tag .valor {
            font-family: "Montserrat", sans-serif;
            font-weight: 900;
            font-size: 36px;
            color: #ffffff;
            letter-spacing: 2px;
        }

        /* ── ÁREA DIREITA — foto do professor ── */
        .right-area {
            position: absolute;
            right: -100px;
            top: 80%;
            z-index: 10;
            transform: translateY(-50%) scale(1.3);
        }


        /* Card da foto — igual ao modelo */

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }

        /* Checkmarks decorativos — canto superior e inferior direito */


        /* ── PAINEL DE CONTROLE ── */
        .page-instructions {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 22px 30px;
            max-width: 1920px;
            width: 100%;
            color: rgba(255, 255, 255, 0.65);
            font-size: 15px;
            line-height: 1.6;
        }

        .page-instructions h2 {
            color: #fff;
            font-size: 18px;
            margin-bottom: 6px;
        }

        .page-instructions code {
            background: rgba(255, 255, 255, 0.12);
            padding: 2px 7px;
            border-radius: 4px;
            font-family: monospace;
        }

        .download-btn {
            margin-top: 20px;
            background: #1a7ed4;
            color: white;
            border: none;
            padding: 14px 28px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(26, 126, 212, 0.3);
        }

        .download-btn:hover {
            background: #1565c0;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 126, 212, 0.4);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .download-btn svg {
            width: 20px;
            height: 20px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                gap: 0;
            }

            .page-instructions {
                display: none;
            }

            .yt-thumbnail {
                box-shadow: none;
                border-radius: 0;
                page-break-after: always;
            }
        }
    </style>
</head>

<body>


    <div class="page-instructions">
        <h2>🎬 Thumbnail YouTube — Auditor Fiscal<br>
            <br>Sefaz Bahia | Banca FCC | R$ 22 mil
        </h2>
        <p>Thumbnail Full HD <code>1920×1080px</code>. As cores seguem o padrão do modelo original (azul
            <code>#1a7ed4</code>).</p>
        <button id="btn-export" class="download-btn">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
            </svg>
            Baixar Thumbnail (PNG)
        </button>
    </div>

    <!-- ══════════════════════════════════════ THUMBNAIL ══════════════════════════════════════ -->
    <div class="yt-thumbnail">

        <!-- Fundo -->
        <div class="bg-layer"></div>
        <div class="bg-pattern"></div>
        <div class="bg-gradient"></div>

        <!-- Decoração: checkmarks SVG no canto superior direito (como na referência) -->
        <svg class="deco-checks" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- checkmark grande topo direito -->
            <rect x="260" y="10" width="130" height="130" rx="28" fill="white" opacity="0.22" />
            <polyline points="280,72 305,97 350,45" stroke="white" stroke-width="16" stroke-linecap="round"
                stroke-linejoin="round" opacity="0.9" />
            <!-- checkmark pequeno parcial direita média -->
            <rect x="330" y="180" width="90" height="90" rx="20" fill="white" opacity="0.15" />
            <polyline points="347,225 362,242 393,204" stroke="white" stroke-width="12" stroke-linecap="round"
                stroke-linejoin="round" opacity="0.75" />
        </svg>

        <!-- Logo do Estado da Bahia — centro superior -->
        <img class="logo-estado" src="SefazBahiaLogo.png" alt="Estado da Bahia">

        <!-- ── ÁREA ESQUERDA ── -->
        <div class="left-area">

            <!-- Badges — Análise / DO EDITAL -->
            <div class="badges-row">
                <div class="badge-analise">Análise</div>
                <div class="badge-edital">
                    <div class="badge-icon">
                        <!-- ícone de câmera/vídeo -->
                        <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M17 10.5V7a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h12a1 1 0 001-1v-3.5l4 4v-11l-4 4z" />
                        </svg>
                    </div>
                    DO EDITAL
                </div>
            </div>

            <!-- Título principal -->
            <div class="main-title">
                <span class="line-1"> AUDITOR FISCAL</span>
                <span class="line-2-wrap">
                    <span class="line-2">SEFAZ BAHIA - FCC</span>
                </span>
            </div>

            <!-- Pill remuneração -->
            <div class="remun-pill">
                <span>Remuneração de R$ 22 mil</span>
            </div>

            <!-- Banca FCC -->
            <div class="banca-tag">
                <span class="label">Banca</span>
                <span class="valor">FCC</span>
            </div>

        </div>

        <!-- ── ÁREA DIREITA — card com foto ── -->
        <div class="right-area">
            <div class="photo-card">
                <img src="WILSON 04.png" alt="Prof. Wilsinho Tavares">
            </div>
        </div>

    </div><!-- fim .yt-thumbnail -->

    <script>
        document.getElementById('btn-export').addEventListener('click', function () {
            const btn = this;
            const originalHTML = btn.innerHTML;

            btn.innerHTML = '⏳ Processando...';
            btn.style.opacity = '0.7';
            btn.style.pointerEvents = 'none';

            const target = document.querySelector('.yt-thumbnail');
            window.scrollTo(0, 0);

            html2canvas(target, {
                scale: 1,
                useCORS: true,
                backgroundColor: '#1a7ed4',
                logging: false,
                width: 1920,
                height: 1080,
                onclone: (clonedDoc) => {
                    const thumb = clonedDoc.querySelector('.yt-thumbnail');
                    thumb.style.transform = 'none';
                    thumb.style.boxShadow = 'none';
                    thumb.style.borderRadius = '0';
                }
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'thumb-sefaz-bahia-auditor-fiscal.png';
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();

                btn.innerHTML = originalHTML;
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            }).catch(err => {
                console.error('Erro ao exportar:', err);
                alert('Erro ao gerar imagem.');
                btn.innerHTML = originalHTML;
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            });
        });
    </script>

</body>

</html>
