<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail YouTube — Prof. Wilsinho Tavares</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@700;800;900&display=swap"
        rel="stylesheet">
    <!-- html2canvas para exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: #0f1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
            padding: 60px 20px;
            min-height: 100vh;
        }

        .yt-thumbnail {
            width: 1920px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 60px 180px rgba(0, 0, 0, 0.6);
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .yt-thumbnail:hover {
            transform: translateY(-6px);
            box-shadow: 0 60px 160px rgba(0, 0, 0, 0.7);
        }

        .bg-layer {
            position: absolute;
            inset: 0;
            background: #1a7ed4;
        }

        .bg-pattern {
            position: absolute;
            inset: 0;
            opacity: 0.16;
            background-image: url("logotecconcursos.png");
            background-size: 270px auto;
            background-repeat: repeat;
            transform: rotate(-15deg) scale(1);
            transform-origin: center center;
        }

        .bg-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(10, 70, 150, 0.35) 100%);
        }

        .left-area {
            position: absolute;
            left: 60px;
            top: 0;
            bottom: 0;
            width: 1200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
        }

        .badges-row {
            transform: rotate(-2deg);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 32px;
            margin-left: 10px;

        }

        .badge-tutorial {
            background: #ffffff;
            color: #1a7ed4;
            font-family: "Montserrat", sans-serif;
            font-weight: 900;
            font-size: 52px;
            padding: 15px 54px;
            margin-left: 40px;
            border-radius: 75px;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.2);
        }

        .badge-ferramentas {
            background: #111111;
            color: #ffffff;
            font-family: "Montserrat", sans-serif;
            font-weight: 800;
            font-size: 42px;
            padding: 18px 48px 18px 30px;
            border-radius: 75px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.3);
        }

        .badge-icon {
            width: 63px;
            height: 63px;
            background: #1a7ed4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .badge-icon svg {
            width: 36px;
            height: 36px;
        }

        .main-title {
            font-family: "Montserrat", sans-serif;
            font-weight: 900;
            font-size: 102px;
            line-height: 1.10;
            color: #ffffff;
            letter-spacing: -2px;
            text-shadow: 0 6px 36px rgba(0, 0, 0, 0.25);
        }

        .tec-word {
            font-style: italic;
            display: inline-flex;
            align-items: baseline;
            gap: 0;
        }

        .tec-box {
            background: #ffffff;
            color: #111111;
            font-style: normal;
            padding: 0 10px 4px 10px;
            border-radius: 18px;
            margin-right: 2px;
            display: inline-block;
            line-height: 1.1;
        }

        .right-area {
            position: absolute;
            right: 80px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .photo-card {
            width: 645px;
            height: 855px;
            border-radius: 48px;
            overflow: hidden;
            box-shadow:
                0 0 0 6px rgba(255, 255, 255, 0.35),
                0 45px 120px rgba(0, 0, 0, 0.4);
            position: relative;
            background: #888;
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }

        .photo-badge {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-badge svg {
            width: 33px;
            height: 33px;
            color: white;
        }

        .page-instructions {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 22px 30px;
            max-width: 1920px;
            width: 100%;
            color: rgba(255, 255, 255, 0.65);
            font-size: 15px;
            line-height: 1.6;
        }

        .page-instructions h2 {
            color: #fff;
            font-size: 18px;
            margin-bottom: 6px;
        }

        .page-instructions code {
            background: rgba(255, 255, 255, 0.12);
            padding: 2px 7px;
            border-radius: 4px;
            font-family: monospace;
        }

        .download-btn {
            margin-top: 20px;
            background: #1a7ed4;
            color: white;
            border: none;
            padding: 14px 28px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(26, 126, 212, 0.3);
        }

        .download-btn:hover {
            background: #1565c0;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 126, 212, 0.4);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .download-btn svg {
            width: 20px;
            height: 20px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                gap: 0;
            }

            .page-instructions {
                display: none;
            }

            .yt-thumbnail {
                box-shadow: none;
                border-radius: 0;
                page-break-after: always;
            }
        }
    </style>
</head>

<body>

    <div class="page-instructions">
        <h2>🎬 Gerador de Thumbnail YouTube</h2>
        <p>Edite o título, badges e a imagem diretamente no HTML. Thumbnail no formato Full HD <code>1920x1080px</code>
            (16:9).
        </p>
        <button id="btn-export" class="download-btn">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
            </svg>
            Baixar Thumbnail (PNG)
        </button>
    </div>

    <div class="yt-thumbnail">
        <div class="bg-layer"></div>
        <div class="bg-pattern"></div>
        <div class="bg-gradient"></div>

        <div class="left-area">
            <div class="badges-row">
                <div class="badge-tutorial">Tutorial</div>
                <div class="badge-ferramentas">
                    <div class="badge-icon">
                        <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z" />
                        </svg>
                    </div>
                    ferramentas
                </div>
            </div>
            <!-- ESCREVER AQUI -->
            <div class="main-title">
                COMO CRIAR UM SIMULADO<br>
                UTILIZANDO OS GUIAS NO<br>
                <span class="tec-word"><span class="tec-box">tec</span>concursos</span>?
            </div>
        </div>

        <div class="right-area">
            <div class="photo-card">
                <img src="WILSON v1.png" alt="Prof. Wilsinho Tavares">
                <div class="photo-badge">
                    <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('btn-export').addEventListener('click', function () {
            const btn = this;
            const originalText = btn.innerHTML;

            // Feedback visual
            btn.innerHTML = "Processando...";
            btn.style.opacity = "0.7";
            btn.style.pointerEvents = "none";

            const target = document.querySelector('.yt-thumbnail');

            // Fixa scroll para evitar desvios na renderização
            window.scrollTo(0, 0);

            html2canvas(target, {
                scale: 2, // Aumenta para 2x para evitar desfoque e distorção
                useCORS: true,
                backgroundColor: "#1a7ed4",
                logging: false,
                width: 1920,
                height: 1080,
                onclone: (clonedDoc) => {
                    // Garante que a cópia usada para a foto esteja "limpa"
                    const thumb = clonedDoc.querySelector('.yt-thumbnail');
                    thumb.style.transform = 'none';
                    thumb.style.boxShadow = 'none';
                    thumb.style.borderRadius = '0'; // Opcional, mantemos 0 para o arquivo bruto
                }
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'thumbnail-youtube.png';
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();

                // Restaurar botão
                btn.innerHTML = originalText;
                btn.style.opacity = "1";
                btn.style.pointerEvents = "auto";
            }).catch(err => {
                console.error("Erro ao exportar:", err);
                alert("Erro ao gerar imagem. Tente usar o método do navegador (F12).");
                btn.innerHTML = originalText;
                btn.style.opacity = "1";
                btn.style.pointerEvents = "auto";
            });
        });
    </script>
</body>

</html>
