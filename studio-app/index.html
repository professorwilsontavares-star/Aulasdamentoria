<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Studio — Prof. Wilsinho Tavares</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🚀</span>
                    <h1>Creator Studio</h1>
                </div>
            </div>

            <nav class="nav-menu">
                <button class="nav-item active" data-template="toutubeferramentastec">
                    <span class="nav-icon">📺</span>
                    YouTube Ferramentas TEC
                </button>
                <button class="nav-item" data-template="instagram">
                    <span class="nav-icon">📸</span>
                    Instagram Carousels
                </button>
            </nav>

            <button id="toggle-sidebar" class="collapse-btn sidebar-collapse" title="Recolher Menu">
                <span>◀</span>
            </button>

            <div class="sidebar-footer">
                <p>© 2026 Prof. Wilson Tavares</p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Preview Section -->
            <section class="preview-section">
                <header class="preview-header">
                    <h2>Live Preview</h2>
                    <div class="preview-actions">
                        <div class="zoom-controls">
                            <button id="zoom-out" class="btn-icon" title="Diminuir">➖</button>
                            <span id="zoom-level">35%</span>
                            <button id="zoom-in" class="btn-icon" title="Aumentar">➕</button>
                        </div>
                        <button id="btn-download" class="btn-primary">
                            <span class="icon">⬇️</span>
                            Exportar PNG
                        </button>
                    </div>
                </header>

                <div id="preview-container" class="preview-container">
                    <!-- Template will be rendered here -->
                </div>
            </section>

            <!-- Editor Section -->
            <section class="editor-section">
                <button id="toggle-editor" class="collapse-btn editor-collapse" title="Recolher Editor">
                    <span>▶</span>
                </button>
                <header class="editor-header">
                    <h2>Configurações</h2>
                </header>
                <div id="editor-form" class="editor-form">
                    <!-- Form fields base on template -->
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
